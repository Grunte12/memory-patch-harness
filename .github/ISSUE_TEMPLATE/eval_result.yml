name: Eval result
description: Share a live-model or harness evaluation result.
title: "[Eval]: "
labels: ["evaluation"]
body:
  - type: input
    id: model
    attributes:
      label: Model or agent setup
      placeholder: "Example: Model X, Strategy C - Memory Patch"
    validations:
      required: true
  - type: dropdown
    id: strategy
    attributes:
      label: Strategy
      options:
        - A - Direct Writer
        - B - Curator Inference
        - C - Memory Patch
        - Other
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command or procedure
      description: How did you run the eval?
    validations:
      required: true
  - type: textarea
    id: result
    attributes:
      label: Results
      description: Include pass rate, patch-quality score, failures, and caveats.
    validations:
      required: true
  - type: textarea
    id: failures
    attributes:
      label: Failure examples
      description: Use anonymized fixtures only.
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I did not include secrets, private transcripts, or private vault content.
          required: true

